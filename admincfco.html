<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Admin CFCO | APLO</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-lg w-full bg-white rounded-[40px] shadow-2xl p-10 text-center">
        <h1 class="text-3xl font-black text-slate-800 mb-2">CAAP</h1>
        <p class="text-slate-500 mb-8 font-medium">Área de Atualização Administrativa</p>

        <div id="loginStep" class="space-y-4">
            <input id="token" type="password" placeholder="password" 
                   class="w-full p-5 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-600 font-mono text-center">
            <button onclick="checkToken()" 
                    class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold hover:bg-black transition shadow-lg">
                Entrar no Sistema
            </button>
        </div>

        <div id="uploadStep" class="hidden space-y-6">
            <div id="dropZone" class="border-4 border-dashed border-slate-100 rounded-3xl p-10 cursor-pointer hover:bg-slate-50 transition group" 
                 onclick="document.getElementById('csvFile').click()">
                
                <input type="file" id="csvFile" accept=".csv" class="hidden" onchange="fileSelected()">
                
                <div id="fileIcon" class="bg-slate-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition">
                    <i class="fas fa-file-csv text-2xl text-slate-400"></i>
                </div>
                
                <span id="fileName" class="block font-bold text-slate-700">Clique para selecionar CSV</span>
                <span class="text-xs text-slate-400">Colunas: NumeroMembro, Evento, Ano, CFCO</span>
            </div>

            <button id="btnSave" onclick="processarCSV()" 
                    class="w-full bg-emerald-600 text-white p-5 rounded-2xl font-black shadow-lg hover:bg-emerald-700 transition disabled:opacity-50">
                PUBLICAR NO GITHUB
            </button>
            
            <p id="status" class="text-sm font-bold mt-4"></p>
        </div>
    </div>

    <script>
        const OWNER = 'APLO-Optometria';
        const REPO = 'aplo.github.io';
        const FILE_PATH = 'membros.json';

        function checkToken() {
            const t = document.getElementById('token').value.trim();
            if(t.length < 10) return alert("Por favor, insira um Token válido.");
            document.getElementById('loginStep').classList.add('hidden');
            document.getElementById('uploadStep').classList.remove('hidden');
        }

        // Esta função corre assim que escolhes o ficheiro na janela do Windows/Mac
        function fileSelected() {
            const input = document.getElementById('csvFile');
            const fileNameDisplay = document.getElementById('fileName');
            const icon = document.getElementById('fileIcon');

            if (input.files.length > 0) {
                fileNameDisplay.innerText = "Ficheiro: " + input.files[0].name;
                fileNameDisplay.classList.add('text-blue-600');
                icon.classList.replace('bg-slate-50', 'bg-blue-50');
                icon.querySelector('i').classList.replace('text-slate-400', 'text-blue-600');
            }
        }

        async function processarCSV() {
            const fileInput = document.getElementById('csvFile');
            const token = document.getElementById('token').value.trim();
            const status = document.getElementById('status');
            const btn = document.getElementById('btnSave');

            if(!fileInput.files[0]) return alert("Selecione primeiro o ficheiro CSV.");

            btn.disabled = true;
            status.className = "text-sm font-bold mt-4 text-blue-600";
            status.innerText = "⏳ A ler ficheiro e a filtrar dados de 2026...";

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const text = e.target.result;
                    const delimiter = text.includes(';') ? ';' : ',';
                    const lines = text.split(/\r?\n/);
                    
                    if(lines.length < 2) throw new Error("Ficheiro CSV vazio ou inválido.");

                    const headers = lines[0].split(delimiter).map(h => h.trim());
                    const result = [];

                    for(let i = 1; i < lines.length; i++) {
                        if(!lines[i].trim()) continue;
                        const obj = {};
                        const currentValues = lines[i].split(delimiter);
                        
                        headers.forEach((h, j) => {
                            obj[h] = currentValues[j] ? currentValues[j].trim() : "";
                        });
                        
                        // FILTRO: Só guarda se o Ano for 2026
                        if(String(obj.Ano) === "2026") {
                            result.push(obj);
                        }
                    }

                    if(result.length === 0) {
                        throw new Error("Não foram encontrados dados com o ano '2026' no ficheiro.");
                    }

                    status.innerText = "🚀 A enviar para o GitHub...";

                    // Lógica da API do GitHub
                    const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
                    let sha = "";
                    
                    const checkFile = await fetch(url, {
                        headers: { 'Authorization': `token ${token}` }
                    });

                    if(checkFile.ok) {
                        const fileData = await checkFile.json();
                        sha = fileData.sha;
                    }

                    const updateRes = await fetch(url, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({
                            message: `Admin: Atualização Membros 2026 (${result.length} registos)`,
                            content: btoa(unescape(encodeURIComponent(JSON.stringify(result, null, 2)))),
                            sha: sha
                        })
                    });

                    if(updateRes.ok) {
                        status.className = "text-sm font-bold mt-4 text-emerald-600";
                        status.innerText = "✅ SUCESSO! Dados de 2026 publicados.";
                        alert("Concluído! O site mostrará os novos dados em cerca de 1 minuto.");
                    } else {
                        const errData = await updateRes.json();
                        throw new Error(errData.message || "Erro na API do GitHub.");
                    }

                } catch(err) {
                    status.className = "text-sm font-bold mt-4 text-red-600";
                    status.innerText = "❌ ERRO: " + err.message;
                    console.error(err);
                } finally {
                    btn.disabled = false;
                }
            };

            reader.onerror = () => alert("Erro ao ler o ficheiro físico.");
            reader.readAsText(fileInput.files[0]);
        }
    </script>
</body>
</html>
