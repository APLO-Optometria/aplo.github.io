<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formações Acreditadas | APLO</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; }
        .table-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50">

<nav class="bg-white border-b shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-700 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">👁️</div>
            <div>
                <h1 class="text-2xl font-semibold text-slate-800">Formações Acreditadas</h1>
                <p class="text-xs text-slate-500">APLO - Associação de Profissionais Licenciados de Optometria</p>
            </div>
        </div>
        <a href="admin.html" class="text-xs text-slate-400 hover:text-slate-600">Admin</a>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-6 py-8">
    <div class="text-center mb-10">
        <h2 class="text-4xl font-bold text-slate-800">Eventos e Formações Acreditadas</h2>
    </div>

    <div class="bg-white p-4 rounded-3xl shadow-sm mb-8 flex flex-col md:flex-row gap-4">
        <input id="search" type="text" placeholder="🔎 Pesquisar evento ou entidade..." 
               class="flex-1 px-5 py-4 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-600">
        <select id="tipoFilter" class="px-5 py-4 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-600">
            <option value="">Todos os tipos</option>
        </select>
    </div>

    <div class="bg-white rounded-3xl shadow overflow-hidden">
        <table class="w-full">
            <thead class="bg-slate-900 text-white">
                <tr>
                    <th class="px-8 py-6 text-left">Evento</th>
                    <th class="px-8 py-6 text-left">Entidade</th>
                    <th class="px-8 py-6 text-left">Tipo</th>
                    <th class="px-8 py-6">Ano</th>
                    <th class="px-8 py-6">CFCO</th>
                    <th class="px-8 py-6 text-center">Acesso</th>
                </tr>
            </thead>
            <tbody id="tableBody" class="divide-y"></tbody>
        </table>
    </div>
</div>

<script>
    let allEvents = [];

    async function loadEvents() {
        try {
            const res = await fetch('eventos.json');
            const data = await res.json();
            allEvents = data.eventos || [];
            renderTable(allEvents);
            populateFilter();
        } catch(e) {
            alert("Erro ao carregar dados. Verifica se o ficheiro eventos.json existe.");
        }
    }

    function populateFilter() {
        const select = document.getElementById('tipoFilter');
        const tipos = [...new Set(allEvents.map(e => e.tipo))].filter(Boolean).sort();
        tipos.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t;
            opt.textContent = t;
            select.appendChild(opt);
        });
    }

    function renderTable(events) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        events.forEach(ev => {
            const tr = document.createElement('tr');
            tr.className = 'table-row';
            tr.innerHTML = `
                <td class="px-8 py-6 font-medium">${ev.evento}</td>
                <td class="px-8 py-6 text-slate-600">${ev.entidade}</td>
                <td class="px-8 py-6"><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-xl text-xs">${ev.tipo}</span></td>
                <td class="px-8 py-6">${ev.ano}</td>
                <td class="px-8 py-6 font-semibold text-emerald-700">${ev.cfco}</td>
                <td class="px-8 py-6 text-center">
                    <a href="${ev.hiperligacao}" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-2xl text-sm inline-flex items-center gap-2">
                        <i class="fas fa-external-link-alt"></i> Aceder
                    </a>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Filtros
    document.getElementById('search').addEventListener('input', filter);
    document.getElementById('tipoFilter').addEventListener('change', filter);

    function filter() {
        const term = document.getElementById('search').value.toLowerCase();
        const tipo = document.getElementById('tipoFilter').value;

        const filtered = allEvents.filter(ev => {
            const matchText = !term || ev.evento.toLowerCase().includes(term) || ev.entidade.toLowerCase().includes(term);
            const matchTipo = !tipo || ev.tipo === tipo;
            return matchText && matchTipo;
        });

        renderTable(filtered);
    }

    window.onload = loadEvents;
</script>
</body>
</html>
