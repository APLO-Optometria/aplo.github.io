<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - APLO Formações</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-100">
    <div class="max-w-2xl mx-auto mt-20 bg-white rounded-3xl shadow p-8">
        <h1 class="text-3xl font-bold mb-8 text-center">Área Administrativa APLO</h1>

        <div id="loginScreen">
            <p class="text-sm text-gray-500 mb-4 text-center">Insira o seu GitHub Token para autenticar as alterações.</p>
            <input id="password" type="password" placeholder="GitHub Personal Access Token" 
                   class="w-full px-5 py-4 border rounded-2xl mb-4">
            <button onclick="login()" 
                    class="w-full bg-blue-700 text-white py-4 rounded-2xl font-medium hover:bg-blue-800 transition">Entrar</button>
        </div>

        <div id="adminScreen" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold">Adicionar Novo Evento</h2>
                <button onclick="logout()" class="text-red-500 text-sm hover:underline">Sair</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <input id="entidade" placeholder="Entidade" class="p-4 border rounded-xl">
                <input id="evento" placeholder="Nome do Evento" class="p-4 border rounded-xl">
                <select id="tipo" class="p-4 border rounded-xl bg-white">
                    <option value="Formação">Formação</option>
                    <option value="Evento">Evento</option>
                    <option value="Orador">Orador</option>
                </select>
                <input id="ano" placeholder="Ano (ex: 2025)" class="p-4 border rounded-xl">
                <input id="cfco" placeholder="Créditos CFCO" class="p-4 border rounded-xl">
                <input id="link" placeholder="Link (https://...)" class="p-4 border rounded-xl col-span-2">
            </div>

            <button id="btnSave" onclick="addEvent()" 
                    class="w-full mt-6 bg-emerald-600 text-white py-4 rounded-2xl font-medium hover:bg-emerald-700 transition flex items-center justify-center gap-2">
                <i class="fas fa-save"></i> Gravar no GitHub
            </button>
            <p id="statusMsg" class="mt-4 text-center text-sm hidden"></p>
        </div>
    </div>

        // --- CONFIGURAÇÃO DO REPOSITÓRIO ---
        const OWNER = 'APLO-Optometria'; // Substitui pelo teu username
        const REPO = 'aplo.github.io';    // Substitui pelo nome do projeto
        const FILE_PATH = 'eventos.json';
        
        let GH_TOKEN = "";

        function login() {
            const pass = document.getElementById('password').value;
            if (pass.length > 10) { // Validação simples de tamanho de token
                GH_TOKEN = pass;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminScreen').classList.remove('hidden');
            } else {
                alert("Por favor, insira um token válido.");
            }
        }

            const btn = document.getElementById('btnSave');
            const status = document.getElementById('statusMsg');

                cfco: document.getElementById('cfco').value,
                hiperligacao: document.getElementById('link').value
            };

                alert("Preencha pelo menos a Entidade e o Nome do Evento.");
                return;
