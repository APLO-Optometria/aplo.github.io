<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta CFCO 2026 | APLO</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

<nav class="bg-white border-b shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <img src="logo_aplo.png" alt="Logo APLO" class="h-12 w-auto object-contain">
            <div>
                <h1 class="text-2xl font-semibold text-slate-800 leading-tight">Portal do Membro</h1>
                <p id="lastUpdate" class="text-xs text-slate-500 italic font-medium">Sincronizando...</p>
            </div>
        </div>
        <a href="admin_membros.html" class="text-slate-400 hover:text-slate-600 transition-colors"><i class="fas fa-lock text-sm"></i></a>
    </div>
</nav>

<div class="max-w-4xl mx-auto px-6 py-12">
    <div id="searchBox" class="bg-white p-10 md:p-16 rounded-[40px] shadow-sm border border-slate-200 text-center animate-fade-in">
        <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-8 text-3xl shadow-inner">
            <i class="fas fa-user-check"></i>
        </div>
        <h2 class="text-3xl font-black text-slate-800 mb-3 tracking-tight">Meus Créditos 2026</h2>
        <p class="text-slate-500 mb-10 max-w-sm mx-auto leading-relaxed text-sm">Introduza o seu número de membro para verificar a listagem de formações de 2026.</p>
        
        <div class="flex flex-col md:flex-row gap-4 max-w-md mx-auto">
            <input id="numMembroInput" type="text" placeholder="Nº de Membro" 
                   class="flex-1 px-8 py-5 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-600 text-center text-2xl font-black text-slate-700 transition-all shadow-sm"
                   onkeypress="if(event.key === 'Enter') consultar()">
            <button onclick="consultar()" class="bg-blue-700 text-white px-10 py-5 rounded-2xl font-black hover:bg-blue-800 transition shadow-lg active:scale-95 text-lg uppercase tracking-wide">
                Entrar
            </button>
        </div>
    </div>

    <div id="resultadoArea" class="hidden animate-fade-in">
        <div class="flex justify-between items-center mb-8">
            <div>
                <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-1">Membro Identificado</p>
                <h2 id="displayNum" class="text-4xl font-black text-slate-800"></h2>
            </div>
            <button onclick="location.reload()" class="bg-slate-100 hover:bg-slate-200 px-5 py-3 rounded-2xl text-xs font-black text-slate-500 transition-all uppercase tracking-tighter">
                <i class="fas fa-sign-out-alt mr-2"></i> Nova Consulta
            </button>
        </div>

        <div class="bg-slate-900 text-white p-10 md:p-14 rounded-[50px] shadow-2xl flex flex-col md:flex-row justify-between items-center gap-10 mb-10 relative overflow-hidden">
            <div class="relative z-10 text-center md:text-left">
                <span class="bg-emerald-500 text-white text-[10px] px-4 py-1.5 rounded-full font-black uppercase tracking-widest">Ciclo 2026</span>
                <h3 class="text-5xl font-black mt-4 tracking-tighter leading-none">CFCO 2026</h3>
            </div>
            <div class="relative z-10 text-center md:text-right">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] mb-2">Total Acumulado</p>
                <div class="flex items-baseline justify-center md:justify-end gap-3">
                    <span id="totalCFCO" class="text-8xl font-black text-emerald-400 leading-none">0</span>
                    <span class="text-emerald-400 font-black text-2xl uppercase tracking-tighter">CFCO</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[40px] shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50/50 border-b border-slate-100 text-slate-400 text-[11px] font-black uppercase tracking-widest">
                    <tr>
                        <th class="px-10 py-6">Evento / Formação</th>
                        <th class="px-10 py-6 text-right">Créditos</th>
                    </tr>
                </thead>
                <tbody id="listaEventos" class="divide-y divide-slate-50 font-medium text-slate-700 italic"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const OWNER = 'APLO-Optometria';
    const REPO = 'aplo.github.io';
    const JSON_URL = `membros.json`;

    async function fetchLastUpdate() {
        try {
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/commits?path=membros.json&per_page=1`);
            const data = await res.json();
            if(data.length > 0) {
                const date = new Date(data[0].commit.committer.date);
                document.getElementById('lastUpdate').innerText = "Atualizado: " + date.toLocaleDateString('pt-PT');
            }
        } catch(e) { document.getElementById('lastUpdate').innerText = "Dados 2026"; }
    }

    async function consultar() {
        const numInput = document.getElementById('numMembroInput').value.trim();
        if(!numInput) return alert("Introduza o número de membro.");

        const btn = document.querySelector('button');
        btn.innerText = "Buscando...";
        btn.disabled = true;

        try {
            // Bypass de Cache
            const response = await fetch(JSON_URL + '?nocache=' + new Date().getTime());
            if(!response.ok) throw new Error("Ficheiro não encontrado.");
            
            const data = await response.json();
            
            // CORREÇÃO: Usar exatamente NumeroMembro como está no teu JSON
            const resultados = data.filter(item => {
                const valorNoFicheiro = item.NumeroMembro || item.NumeroMembro; // Tenta capturar NumeroMembro
                return String(valorNoFicheiro).trim() === String(numInput);
            });

            if(resultados.length === 0) {
                alert("Sem registos de 2026 para o número " + numInput);
                btn.innerText = "Entrar";
                btn.disabled = false;
                return;
            }

            document.getElementById('searchBox').classList.add('
