<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta CFCO 2026 | CAAP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

<nav class="bg-white border-b shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <img src="logo_aplo.png" alt="Logo APLO" class="h-12 w-auto object-contain">
            <div>
                <h1 class="text-xl font-bold text-slate-800 leading-tight">CAAP</h1>
                <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest">Consulta de CFCO 2026</p>
            </div>
        </div>
        <a href="admincfco.html" class="text-slate-300 hover:text-blue-600 transition-colors"><i class="fas fa-cog"></i></a>
    </div>
</nav>

<div class="max-w-4xl mx-auto px-6 py-12">
    <div id="searchBox" class="bg-white p-10 rounded-[40px] shadow-sm border border-slate-200 text-center">
        <h2 class="text-2xl font-black text-slate-800 mb-6">Introduza o seu Código de Acesso</h2>
        
        <div class="flex flex-col md:flex-row gap-3 max-w-md mx-auto">
            <input id="numMembroInput" type="text" placeholder="Ex: A2B3" 
                   class="flex-1 px-6 py-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-600 text-center text-xl font-bold">
            <button onclick="consultar()" class="bg-blue-700 text-white px-8 py-4 rounded-2xl font-bold hover:bg-blue-800 transition shadow-lg">
                Entrar
            </button>
        </div>
    </div>

    <div id="resultadoArea" class="hidden">
        <div class="flex justify-between items-end mb-6">
            <h2 id="displayNum" class="text-3xl font-black text-slate-800"></h2>
            <button onclick="location.reload()" class="text-xs font-bold text-blue-600 uppercase tracking-tighter">Sair / Nova Consulta</button>
        </div>

        <div class="bg-slate-900 text-white p-10 rounded-[40px] shadow-xl flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
            <div class="text-center md:text-left">
                <span class="bg-blue-600 text-[10px] px-3 py-1 rounded-full font-black uppercase">Ano Civil</span>
                <h3 class="text-4xl font-black mt-2">2026</h3>
            </div>
            <div class="text-center md:text-right">
                <p class="text-slate-400 text-xs font-bold uppercase mb-1">Total de CFCO</p>
                <div class="flex items-baseline justify-center md:justify-end gap-2 text-emerald-400">
                    <span id="totalCFCO" class="text-7xl font-black">0</span>
                    <span class="font-bold">CFCO</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[32px] shadow-sm border border-slate-200 overflow-hidden text-sm">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b">
                    <tr>
                        <th class="p-6 font-black text-slate-400 uppercase text-[10px]">Evento</th>
                        <th class="p-6 text-right font-black text-slate-400 uppercase text-[10px]">CFCO</th>
                    </tr>
                </thead>
                <tbody id="listaEventos" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const FILE_PATH = 'membros.json';

    async function consultar() {
        const inputVal = document.getElementById('numMembroInput').value.trim();
        if(!inputVal) return;

        try {
            const response = await fetch(FILE_PATH + '?v=' + Date.now());
            if(!response.ok) throw new Error("Não foi possível ler o arquivo.");
            
            const data = await response.json();
            
            const filtrados = data.filter(item => {
                return String(item.NumeroMembro).trim() === String(inputVal);
            });

            if(filtrados.length === 0) {
                alert("Nenhum CFCO realizado para o código " + inputVal + " em 2026.");
                return;
            }

            document.getElementById('searchBox').classList.add('hidden');
            document.getElementById('resultadoArea').classList.remove('hidden');
            document.getElementById('displayNum').innerText = "Código " + inputVal;

            let soma = 0;
            const tbody = document.getElementById('listaEventos');
            tbody.innerHTML = "";

            filtrados.forEach(e => {
                // LÓGICA DE CÁLCULO: Garante que o JS entende o número (ponto decimal)
                const valorLimpo = String(e.CFCO).replace(',', '.');
                const valorNumerico = parseFloat(valorLimpo);
                soma += isNaN(valorNumerico) ? 0 : valorNumerico;
                
                // LÓGICA VISUAL: Garante que o utilizador vê sempre vírgula na tabela
                const valorParaMostrar = valorLimpo.replace('.', ',');
                
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-6 font-bold text-slate-700">${e.Evento}</td>
                        <td class="p-6 text-right font-black text-emerald-600 text-xl">+${valorParaMostrar}</td>
                    </tr>`;
            });

            // Exibição do TOTAL: Formata com vírgula para manter o padrão
            const totalFormatado = soma.toFixed(1).replace('.', ',').replace(',0', '');
            document.getElementById('totalCFCO').innerText = totalFormatado;

        } catch(err) {
            alert("Erro ao aceder aos dados. Certifique-se que o upload foi concluído.");
            console.error(err);
        }
    }
</script>
</body>
</html>
